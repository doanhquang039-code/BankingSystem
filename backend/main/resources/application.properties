spring.application.name=BankingSystem
server.port=8080

# Kích hoạt profile local cho môi trường dev.
# Khi chạy, Spring Boot sẽ tự động nạp các cấu hình từ application-local.properties.
spring.profiles.active=local

spring.datasource.url=jdbc:mysql://localhost:3306/bank_system?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:placeholder_db_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate không đụng vào schema — Flyway toàn quyền quản lý
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# Bật logging Flyway để thấy migration đang chạy
logging.level.org.flywaydb=DEBUG

# --- Flyway config ---
spring.flyway.enabled=true
# Khai báo rõ nơi chứa file migration
spring.flyway.locations=classpath:db/migration
# Cho phép migration chạy không theo thứ tự (hữu ích khi dev nhiều branch)
spring.flyway.out-of-order=true
# Tắt validate để tránh lỗi checksum nếu đã sửa file cũ
spring.flyway.validate-on-migrate=false
# Tự tạo bảng flyway_schema_history nếu chưa có
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Internationalization
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.web.locale=en
spring.web.locale-resolver=accept-header

# Flyway phải chạy TRƯỚC khi Hibernate khởi tạo EntityManagerFactory
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Google OAuth2 login
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder_google_client_id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder_google_client_secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Facebook OAuth2 login
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:placeholder_facebook_client_id}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:placeholder_facebook_client_secret}
spring.security.oauth2.client.registration.facebook.scope=public_profile,email
spring.security.oauth2.client.registration.facebook.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Microsoft OAuth2 login
spring.security.oauth2.client.registration.microsoft.client-id=${MICROSOFT_CLIENT_ID:placeholder_microsoft_client_id}
spring.security.oauth2.client.registration.microsoft.client-secret=${MICROSOFT_CLIENT_SECRET:placeholder_microsoft_client_secret}
spring.security.oauth2.client.registration.microsoft.scope=openid,profile,email,User.Read
spring.security.oauth2.client.registration.microsoft.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.microsoft.authorization-grant-type=authorization_code

# Provider configurations for Microsoft
spring.security.oauth2.client.provider.microsoft.authorization-uri=https://login.microsoftonline.com/common/oauth2/v2.0/authorize?prompt=select_account
spring.security.oauth2.client.provider.microsoft.token-uri=https://login.microsoftonline.com/common/oauth2/v2.0/token
spring.security.oauth2.client.provider.microsoft.user-info-uri=https://graph.microsoft.com/oidc/userinfo
spring.security.oauth2.client.provider.microsoft.jwk-set-uri=https://login.microsoftonline.com/common/discovery/v2.0/keys
spring.security.oauth2.client.provider.microsoft.user-name-attribute=name

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:placeholder_cloudinary_cloud_name}
cloudinary.api-key=${CLOUDINARY_API_KEY:placeholder_cloudinary_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:placeholder_cloudinary_api_secret}

# JWT Configuration
# Secret phải >= 256 bits (32+ ký tự) để dùng HS256
jwt.secret=${JWT_SECRET:placeholder_jwt_secret}
jwt.expiration-ms=86400000
# 86400000 ms = 24 giờ
