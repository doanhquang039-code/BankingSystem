spring.application.name=BankingSystem
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/bank_system?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate không đụng vào schema — Flyway toàn quyền quản lý
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# Bật logging Flyway để thấy migration đang chạy
logging.level.org.flywaydb=DEBUG

# --- Flyway config ---
spring.flyway.enabled=true
# Khai báo rõ nơi chứa file migration
spring.flyway.locations=classpath:db/migration
# Cho phép migration chạy không theo thứ tự (hữu ích khi dev nhiều branch)
spring.flyway.out-of-order=true
# Tắt validate để tránh lỗi checksum nếu đã sửa file cũ
spring.flyway.validate-on-migrate=false
# Tự tạo bảng flyway_schema_history nếu chưa có
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
# Internationalization
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.web.locale=en
spring.web.locale-resolver=accept-header

# Flyway phải chạy TRƯỚC khi Hibernate khởi tạo EntityManagerFactory
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Google OAuth2 login
spring.security.oauth2.client.registration.google.client-id=google-client-id-placeholder
spring.security.oauth2.client.registration.google.client-secret=google-client-secret-placeholder
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Cloudinary
cloudinary.cloud-name=cloudinary-cloud-name-placeholder
cloudinary.api-key=cloudinary-api-key-placeholder
cloudinary.api-secret=cloudinary-api-secret-placeholder
