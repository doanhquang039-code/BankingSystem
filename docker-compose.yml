# ============================================================
# Mini Banking System – Docker Compose
#
# Services:
#   mysql   – MySQL 8.0 (primary database)
#   redis   – Redis 7   (cache & token blacklist)
#   app     – Spring Boot application
#
# Usage:
#   cp .env.example .env   # fill in real secrets
#   docker-compose up -d
#   docker-compose logs -f app
# ============================================================

version: '3.9'

services:

  # ── MySQL 8.0 ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: banking-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: bank_system
      MYSQL_USER: ${DB_USERNAME:-banking}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bankingpass}
    ports:
      - "3307:3306"      # expose on 3307 to avoid conflict with local MySQL
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - banking-net

  # ── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: banking-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    ports:
      - "6380:6379"      # expose on 6380 to avoid conflict with local Redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-net

  # ── Spring Boot Application ────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: banking-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bank_system?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-banking}
      DB_PASSWORD: ${DB_PASSWORD:-bankingpass}

      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}

      # JWT
      JWT_SECRET: ${JWT_SECRET}

      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

      # OAuth2 – Google
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      # Active profile
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    networks:
      - banking-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# ── Volumes ────────────────────────────────────────────────
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

# ── Networks ───────────────────────────────────────────────
networks:
  banking-net:
    driver: bridge
